<!DOCTYPE html>
<html>
<head>
    <title>Image Recognition System</title>

    <style>
    html, body {
    height: 100%;
    margin: 0;
        }
    body {
         width: 100%;
        height: 100%;
        background-color: rgb(2, 17, 23);
        color: rgb(219, 227, 146);
        font-family: Arial, sans-serif;
        text-align: center;
        font-size: 18px;
        margin-top: 100px;
        background-image: url('/static/uploads/bg.png');
        background-size: cover;
        min-height: 100vh;
        background-repeat: no-repeat;
        background-position: center;
    }

    h1, h2 {
        color: rgb(235, 228, 237);
        border-bottom: 4px solid rgb(3, 33, 51);
        display: inline-block;
    }

    .container {
        max-width: 500px;
        height: 250px;
        margin: 10px auto;
        padding: 20px;
        background-color: rgb(71, 124, 135);
        border-radius: 10px;
        box-shadow: 25px 10px 10px rgba(22, 20, 20, 0.1);
    }

    button {
        background-color: rgb(8, 31, 43);
        color: white;
        border: solid rgb(197, 227, 245) 1.5px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 5px;
         transition: background 0.5s ease;
    }

     button:hover {
    background: rgb(28, 83, 88);
   }
    
    img {
        width: 300px;
        border-radius: 10px;
        border: 3px solid rgb(8, 18, 43);
    }


    </style>

</head>
<body>

<div class="container">

<h1>Image Recognition System</h1>

<form action="/predict" method="POST" enctype="multipart/form-data">

    <input type="file" name="image" required style="font-size: 15px">
    <br><br>

    <button type="submit">
        Predict
    </button>

</form>

</div>

</body>
</html>
